<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Video</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="logo-area">
        <span class="logo-mark">MD</span>
        <span class="logo-text">michelle's art corner</span>
      </div>
      <nav class="main-nav">
        <a href="glitch-images.html">Glitch Images</a>
        <a href="coding.html">Coding</a>
        <a href="digital-video.html">Digital Video</a>
        <a href="digital-illustration.html">Digital Illustration</a>
        <a href="about.html">About the Artist</a>
      </nav>
    </header>

    <main class="page">
      <header class="page-header">
        <h1 class="page-title">Digital Video</h1>
        <a class="back-home" href="index.html"><span>←</span>back home</a>
      </header>

      <section class="page-content">
        <div class="video-grid">
          <button
            class="video-card"
            data-video-src="videos/vanity.mp4"
            aria-label="play vanity video"
          >
            <div class="video-thumb">
              <video src="videos/vanity.mp4" muted></video>
            </div>
            <div class="video-label">vanity</div>
          </button>

          <button
            class="video-card"
            data-video-src="videos/creep.mp4"
            aria-label="play creep video"
          >
            <div class="video-thumb">
              <video src="videos/creep.mp4" muted></video>
            </div>
            <div class="video-label">creep</div>
          </button>
        </div>
      </section>

      <div class="video-modal" id="video-modal" aria-hidden="true">
        <div class="video-modal-inner">
          <button
            class="video-modal-close"
            type="button"
            aria-label="close video"
          >
            ✕
          </button>
          <video id="video-modal-player" controls></video>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Michelle Duong · Digital Media Art</p>
    </footer>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      (function () {
        const modal = document.getElementById("video-modal");
        const player = document.getElementById("video-modal-player");
        const closeBtn = modal.querySelector(".video-modal-close");

        function openModal(src) {
          player.src = src;
          modal.classList.add("is-open");
          modal.setAttribute("aria-hidden", "false");
          player.play();
        }

        function closeModal() {
          modal.classList.remove("is-open");
          modal.setAttribute("aria-hidden", "true");
          player.pause();
          player.currentTime = 0;
          player.removeAttribute("src");
        }

        document.querySelectorAll(".video-card").forEach((card) => {
          card.addEventListener("click", () => {
            const src = card.getAttribute("data-video-src");
            if (src) openModal(src);
          });
        });

        closeBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
          if (e.target === modal) closeModal();
        });
      })();
    </script>
  </body>
</html>

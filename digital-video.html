<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Video</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="logo-link" aria-label="home">
        <div class="logo-area">
          <span class="logo-mark">MD</span>
          <span class="logo-text">michelle's art corner</span>
        </div>
      </a>
      <nav class="main-nav" aria-label="site sections">
        <a href="index.html#coding">Coding</a>
        <a href="index.html#digital-video">Digital Video</a>
        <a href="index.html#digital-illustration">Digital Illustration</a>
        <a href="index.html#about">About the Artist</a>
      </nav>
    </header>

    <main class="page">
      <header class="page-header">
        <h1 class="page-title">Digital Video</h1>
        <a class="back-home" href="index.html#digital-video"
          ><span>←</span>full portfolio</a
        >
      </header>

      <section class="page-content">
        <div class="video-grid">
          <button
            type="button"
            class="video-card"
            data-artwork-box
            data-art-title="running out of time"
            data-art-description=""
            data-video-src="videos/runningoutoftime.mp4"
            aria-label="open details for running out of time"
          >
            <div class="video-thumb">
              <video
                preload="metadata"
                playsinline
                src="videos/runningoutoftime.mp4"
                muted
              ></video>
            </div>
            <div class="video-label">running out of time</div>
          </button>

          <button
            type="button"
            class="video-card"
            data-artwork-box
            data-art-title="vanity"
            data-art-description=""
            data-video-src="videos/vanity.mp4"
            aria-label="open details for vanity"
          >
            <div class="video-thumb">
              <video preload="metadata" playsinline src="videos/vanity.mp4" muted></video>
            </div>
            <div class="video-label">vanity</div>
          </button>

          <button
            type="button"
            class="video-card"
            data-artwork-box
            data-art-title="visions"
            data-art-description=""
            data-video-src="videos/visions.mp4"
            aria-label="open details for visions"
          >
            <div class="video-thumb">
              <video preload="metadata" playsinline src="videos/visions.mp4" muted></video>
            </div>
            <div class="video-label">visions</div>
          </button>

          <button
            type="button"
            class="video-card"
            data-artwork-box
            data-art-title="creep"
            data-art-description=""
            data-video-src="videos/creep.mp4"
            aria-label="open details for creep"
          >
            <div class="video-thumb">
              <video preload="metadata" playsinline src="videos/creep.mp4" muted></video>
            </div>
            <div class="video-label">creep</div>
          </button>
        </div>
      </section>

      <div class="description-modal" id="description-modal" aria-hidden="true">
        <div class="description-modal-inner">
          <button
            type="button"
            class="description-modal-close"
            aria-label="close description"
          >
            ✕
          </button>
          <h3 id="description-modal-title"></h3>
          <p id="description-modal-body"></p>
          <div
            id="description-modal-actions"
            class="description-modal-actions"
          ></div>
        </div>
      </div>

      <div class="video-modal" id="video-modal" aria-hidden="true">
        <div class="video-modal-inner">
          <button
            class="video-modal-close"
            type="button"
            aria-label="close video"
          >
            ✕
          </button>
          <video id="video-modal-player" controls playsinline preload="metadata"></video>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Michelle Duong · Digital Media Art</p>
    </footer>
    <script src="artwork-modals.js" defer></script>
  </body>
</html>

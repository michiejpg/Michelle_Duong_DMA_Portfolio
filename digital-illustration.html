<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Illustration</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="logo-link" aria-label="home">
        <div class="logo-area">
          <span class="logo-mark">MD</span>
          <span class="logo-text">michelle's art corner</span>
        </div>
      </a>
      <nav class="main-nav" aria-label="site sections">
        <a href="index.html#coding">Coding</a>
        <a href="index.html#digital-video">Digital Video</a>
        <a href="index.html#digital-illustration">Digital Illustration</a>
        <a href="index.html#about">About the Artist</a>
      </nav>
    </header>

    <main class="page">
      <header class="page-header">
        <h1 class="page-title">Digital Illustration</h1>
        <a class="back-home" href="index.html#digital-illustration"
          ><span>←</span>full portfolio</a
        >
      </header>

      <section class="page-content">
        <div class="illustration-gallery">
          <figure
            class="illustration-piece"
            data-artwork-box
            data-art-title="digital still life"
            data-art-description="A digital painting of items I have around my room, created with Photoshop."
          >
            <img
              src="images/digitalpainting copy.jpg"
              alt="digital painting illustration"
            />
            <figcaption>digital still life</figcaption>
          </figure>
          <figure
            class="illustration-piece"
            data-artwork-box
            data-art-title="meihua logo"
            data-art-description="A fictional idol group logo, MEIHUA (meaning plum blossoms in the snow), created with Procreate and Photoshop."
          >
            <img src="images/MEIHUA.JPG" alt="meihua illustration" />
            <figcaption>meihua logo</figcaption>
          </figure>
          <figure
            class="illustration-piece"
            data-artwork-box
            data-art-title="human error"
            data-art-description=""
          >
            <img src="images/Human Error.jpg" alt="human error illustration" />
            <figcaption>human error</figcaption>
          </figure>
        </div>
      </section>

      <div class="description-modal" id="description-modal" aria-hidden="true">
        <div class="description-modal-inner">
          <button
            type="button"
            class="description-modal-close"
            aria-label="close description"
          >
            ✕
          </button>
          <h3 id="description-modal-title"></h3>
          <p id="description-modal-body"></p>
          <div
            id="description-modal-actions"
            class="description-modal-actions"
          ></div>
        </div>
      </div>

      <div class="image-modal" id="image-modal" aria-hidden="true">
        <div class="image-modal-inner">
          <button
            class="image-modal-close"
            type="button"
            aria-label="close image"
          >
            ✕
          </button>
          <img id="image-modal-viewer" alt="" />
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Michelle Duong · Digital Media Art</p>
    </footer>
    <script src="artwork-modals.js" defer></script>
  </body>
</html>

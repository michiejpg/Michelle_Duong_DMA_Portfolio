<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Illustration</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="logo-link" aria-label="home">
        <div class="logo-area">
          <span class="logo-mark">MD</span>
          <span class="logo-text">michelle's art corner</span>
        </div>
      </a>
      <nav class="main-nav" aria-label="site sections">
        <a href="index.html#coding">Coding</a>
        <a href="index.html#digital-video">Digital Video</a>
        <a href="index.html#digital-illustration">Digital Illustration</a>
        <a href="index.html#about">About the Artist</a>
      </nav>
    </header>

    <main class="page">
      <header class="page-header">
        <h1 class="page-title">Digital Illustration</h1>
        <a class="back-home" href="index.html#digital-illustration"
          ><span>←</span>full portfolio</a
        >
      </header>

      <section class="page-content">
        <div class="illustration-gallery">
          <figure class="illustration-piece">
            <img
              src="images/digitalpainting copy.jpg"
              alt="digital painting illustration"
            />
            <figcaption>digital still life</figcaption>
          </figure>
          <figure class="illustration-piece">
            <img src="images/MEIHUA.JPG" alt="meihua illustration" />
            <figcaption>meihua logo</figcaption>
          </figure>
          <figure class="illustration-piece">
            <img src="images/Human Error.jpg" alt="human error illustration" />
            <figcaption>human error</figcaption>
          </figure>
        </div>
      </section>

      <div class="image-modal" id="image-modal" aria-hidden="true">
        <div class="image-modal-inner">
          <button
            class="image-modal-close"
            type="button"
            aria-label="close image"
          >
            ✕
          </button>
          <img id="image-modal-viewer" alt="" />
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Michelle Duong · Digital Media Art</p>
    </footer>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();

      (function () {
        const modal = document.getElementById("image-modal");
        const viewer = document.getElementById("image-modal-viewer");
        const closeBtn = modal.querySelector(".image-modal-close");

        function openModal(src, altText) {
          viewer.src = src;
          viewer.alt = altText || "";
          modal.classList.add("is-open");
          modal.setAttribute("aria-hidden", "false");
        }

        function closeModal() {
          modal.classList.remove("is-open");
          modal.setAttribute("aria-hidden", "true");
          viewer.removeAttribute("src");
          viewer.alt = "";
        }

        document.querySelectorAll(".illustration-piece img").forEach((img) => {
          img.addEventListener("click", () => openModal(img.src, img.alt));
        });

        closeBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
          if (e.target === modal) closeModal();
        });
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && modal.classList.contains("is-open")) {
            closeModal();
          }
        });
      })();
    </script>
  </body>
</html>

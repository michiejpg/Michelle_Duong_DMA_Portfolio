<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>Digital Media</title>
    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="logo-link" aria-label="home">
        <div class="logo-area">
          <span class="logo-mark">MD</span>
          <span class="logo-text">michelle's art corner</span>
        </div>
      </a>
      <nav class="main-nav" aria-label="site sections">
        <a href="index.html#coding">Coding</a>
        <a href="index.html#digital-video">Digital Video</a>
        <a href="index.html#digital-media">Digital Media</a>
        <a href="index.html#about">About the Artist</a>
      </nav>
    </header>

    <main class="page">
      <header class="page-header">
        <h1 class="page-title">Digital Media</h1>
        <a class="back-home" href="index.html#digital-media"
          ><span>←</span>full portfolio</a
        >
      </header>

      <section class="page-content">
        <div class="illustration-gallery">
          <figure
            class="illustration-piece"
            data-artwork-box
            data-art-title="digital still life"
            data-art-description="A digital painting of items I have around my room, created with Photoshop."
          >
            <img
              src="images/digitalpainting copy.jpg"
              alt="digital painting illustration"
            />
            <figcaption>digital still life</figcaption>
          </figure>
          <figure
            class="illustration-piece"
            data-artwork-box
            data-art-title="meihua logo"
            data-art-description="A fictional idol group logo, MEIHUA (meaning plum blossoms in the snow), created with Procreate and Illustrator."
          >
            <img src="images/MEIHUA.JPG" alt="meihua illustration" />
            <figcaption>meihua logo</figcaption>
          </figure>
          <figure
            class="illustration-piece"
            data-artwork-box
            data-art-title="human error"
            data-art-description="An art piece responding to Marshall McLuhan's &lt;i&gt;The Medium is the Massage&lt;/i&gt;. A young boy is trapped in a digital world, showcasing how the young generation is being consumed by their use of technology."
          >
            <img src="images/Human Error.jpg" alt="human error illustration" />
            <figcaption>human error</figcaption>
          </figure>
          <figure
            class="illustration-piece"
            data-artwork-box
            data-art-title="bibble fire"
            data-art-description="A meme mashup of elmo in flames and bibble, created with Photoshop"
          >
            <img src="images/bibble fire.jpg" alt="bibble fire artwork" />
            <figcaption>bibble fire</figcaption>
          </figure>
          <figure
            class="illustration-piece"
            data-artwork-box
            data-art-title="odd aquarium"
            data-art-description="A simple aquarium, except the patrons are fish and the ones in the tanks are humans, created with Illustrator"
          >
            <img src="images/odd aquarium.jpg" alt="odd aquarium artwork" />
            <figcaption>odd aquarium</figcaption>
          </figure>
        </div>
      </section>

      <div class="description-modal" id="description-modal" aria-hidden="true">
        <div class="description-modal-inner">
          <button
            type="button"
            class="description-modal-close"
            aria-label="close description"
          >
            ✕
          </button>
          <h3 id="description-modal-title"></h3>
          <p id="description-modal-body"></p>
          <div
            id="description-modal-actions"
            class="description-modal-actions"
          ></div>
        </div>
      </div>

      <div class="image-modal" id="image-modal" aria-hidden="true">
        <div class="image-modal-inner">
          <button
            class="image-modal-close"
            type="button"
            aria-label="close image"
          >
            ✕
          </button>
          <img id="image-modal-viewer" alt="" />
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Michelle Duong · Digital Media Art</p>
    </footer>
    <script src="artwork-modals.js?v=2" defer></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>michelle's art corner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="logo-area">
        <span class="logo-mark">MD</span>
        <span class="logo-text">michelle's art corner</span>
      </div>
      <nav class="main-nav">
        <a href="coding.html">Coding</a>
        <a href="digital-video.html">Digital Video</a>
        <a href="digital-illustration.html">Digital Illustration</a>
        <a href="about.html">About the Artist</a>
      </nav>
    </header>

    <main class="page page-home">
      <section class="hero">
        <h1 class="hero-title">michelle's art corner</h1>
      </section>

      <section class="grid">
        <a href="coding.html" class="card card-has-preview">
          <div class="card-preview card-preview-grid" aria-hidden="true">
            <img
              src="images/netart copy.jpg"
              alt=""
            />
            <img
              src="images/edmdressup copy.jpg"
              alt=""
            />
            <img src="images/systemerror.png" alt="" />
          </div>
          <h2>Coding</h2>
        </a>
        <a href="digital-video.html" class="card card-has-preview">
          <div class="card-preview card-preview-video-row" aria-hidden="true">
            <div class="card-preview-video-cell">
              <video
                src="videos/vanity.mp4"
                muted
                playsinline
                preload="metadata"
              ></video>
            </div>
            <div class="card-preview-video-cell">
              <video
                src="videos/creep.mp4"
                muted
                playsinline
                preload="metadata"
              ></video>
            </div>
          </div>
          <h2>Digital Video</h2>
        </a>
        <a href="digital-illustration.html" class="card card-has-preview">
          <div class="card-preview card-preview-grid card-preview-grid-2" aria-hidden="true">
            <img
              src="images/digitalpainting copy.jpg"
              alt=""
            />
            <img src="images/MEIHUA.JPG" alt="" />
          </div>
          <h2>Digital Illustration</h2>
        </a>
        <a href="about.html" class="card card-has-preview card-wide">
          <div class="card-preview card-preview-solo" aria-hidden="true">
            <img src="images/michie.JPG" alt="" />
          </div>
          <h2>About the Artist</h2>
        </a>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> Michelle Duong · Digital Media Art</p>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
